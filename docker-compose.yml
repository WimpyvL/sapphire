# Sani - Docker Compose
# Usage:
#   docker compose up        (start)
#   docker compose pull      (update to latest)
#   docker compose down      (stop)
#
# First run: open https://localhost:3004 and complete setup wizard
# Data is stored in ./sani-data/ next to this file for fresh installs.
# Legacy Sapphire paths still work if you already have data there.

services:
  sani:
    image: ghcr.io/ddxfish/sani:latest
    # For local development builds, comment out 'image' above and uncomment:
    # build: .
    container_name: sani
    restart: unless-stopped
    ports:
      - "3004:3004"
    volumes:
      # User data — chats, memories, settings, plugins (visible on your machine)
      - ./sani-data:/app/user
      # Backups — separate from user data for safety
      - ./sani-backups:/app/user_backups
      # Credentials — API keys, secrets
      - ./sani-config:/home/sani/.config/sani
    environment:
      # Timezone — find yours: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      TZ: "America/New_York"

      # LLM API Keys — uncomment and fill in what you use
      # ANTHROPIC_API_KEY: "your-key-here"
      # OPENAI_API_KEY: "your-key-here"
      # GOOGLE_API_KEY: "your-key-here"

      # LM Studio on host machine (uncomment if using local LLM)
      # For Docker Desktop (Mac/Windows):
      # LMSTUDIO_BASE_URL: "http://host.docker.internal:1234/v1"
      # For Linux Docker:
      # LMSTUDIO_BASE_URL: "http://172.17.0.1:1234/v1"
    extra_hosts:
      # Allows container to reach host services (LM Studio, etc.)
      - "host.docker.internal:host-gateway"
